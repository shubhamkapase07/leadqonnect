<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LeadFinder</title>
  <style>
    :root {
      --bg: #f6f7f9; --card: #ffffff; --border: #e3e6ea; --text: #14181d;
      --muted: #667085; --accent: #2f6fed; --accent-weak: #eaf1ff;
      --hi: #128a5b; --hi-bg: #e6f6ee; --mid: #b7791f; --mid-bg: #fcf3e3; --lo: #98a2b3; --lo-bg: #f2f4f7;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0e1116; --card: #171b21; --border: #262c34; --text: #e7eaee;
        --muted: #8b95a3; --accent: #5b8cff; --accent-weak: #16233f;
        --hi: #3ecf8e; --hi-bg: #12291f; --mid: #e0b34d; --mid-bg: #2a2416; --lo: #667085; --lo-bg: #1c2128;
      }
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text);
      font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    header { padding: 20px 20px 8px; max-width: 1000px; margin: 0 auto; }
    h1 { font-size: 22px; margin: 0 0 2px; letter-spacing: -0.02em; }
    .sub { color: var(--muted); font-size: 13px; }
    .wrap { max-width: 1000px; margin: 0 auto; padding: 0 20px 60px; }
    .filters { display: flex; flex-wrap: wrap; gap: 8px; margin: 16px 0; position: sticky; top: 0;
      background: var(--bg); padding: 10px 0; z-index: 5; }
    select, input, button { font: inherit; color: var(--text); background: var(--card);
      border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; }
    input[type=search] { flex: 1; min-width: 160px; }
    button { cursor: pointer; }
    button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 14px 16px; margin-bottom: 12px; }
    .row { display: flex; gap: 10px; align-items: flex-start; justify-content: space-between; }
    .title { font-weight: 600; margin: 0 0 4px; }
    .title a { color: inherit; text-decoration: none; }
    .title a:hover { text-decoration: underline; }
    .meta { color: var(--muted); font-size: 12.5px; margin-bottom: 8px; }
    .body { font-size: 14px; color: var(--text); white-space: pre-wrap; max-height: 5.5em; overflow: hidden;
      position: relative; margin-bottom: 10px; }
    .scores { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
    .pill { font-size: 12px; padding: 2px 8px; border-radius: 999px; border: 1px solid var(--border); white-space: nowrap; }
    .pill b { font-weight: 700; }
    .sent-high { color: var(--hi); background: var(--hi-bg); border-color: transparent; }
    .sent-medium { color: var(--mid); background: var(--mid-bg); border-color: transparent; }
    .sent-low { color: var(--lo); background: var(--lo-bg); border-color: transparent; }
    .ai { background: var(--accent-weak); color: var(--accent); border-color: transparent; }
    .angle { font-size: 13.5px; background: var(--accent-weak); border-radius: 8px; padding: 8px 10px; margin-bottom: 10px; }
    .reasons { font-size: 12.5px; color: var(--muted); margin-bottom: 10px; }
    .actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .actions button { padding: 5px 10px; font-size: 13px; }
    .status-tag { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; padding: 2px 8px;
      border-radius: 6px; background: var(--lo-bg); color: var(--muted); }
    .empty { text-align: center; color: var(--muted); padding: 60px 20px; }
    .num { font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>
  <header>
    <h1>LeadFinder</h1>
    <div class="sub" id="sub">Loading…</div>
  </header>
  <div class="wrap">
    <div class="filters">
      <select id="status">
        <option value="new">New</option>
        <option value="all">All statuses</option>
        <option value="contacted">Contacted</option>
        <option value="won">Won</option>
        <option value="dismissed">Dismissed</option>
      </select>
      <select id="sort">
        <option value="intent">Sort: Intent</option>
        <option value="recent">Sort: Recent</option>
      </select>
      <select id="minIntent">
        <option value="0">Any intent</option>
        <option value="50">Intent ≥ 50</option>
        <option value="70">Intent ≥ 70</option>
        <option value="85">Intent ≥ 85</option>
      </select>
      <input type="search" id="search" placeholder="Search title / body / author…" />
      <button class="primary" id="refresh">Refresh</button>
    </div>
    <div id="list"></div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const TOKEN_KEY = "leadfinder_token";
    let token = localStorage.getItem(TOKEN_KEY) || "";

    function headers() {
      const h = { "Content-Type": "application/json" };
      if (token) h["x-access-token"] = token;
      return h;
    }

    function fmtTime(unix) {
      if (!unix) return "";
      const d = new Date(unix * 1000);
      const diff = (Date.now() - d.getTime()) / 1000;
      if (diff < 3600) return Math.floor(diff / 60) + "m ago";
      if (diff < 86400) return Math.floor(diff / 3600) + "h ago";
      return Math.floor(diff / 86400) + "d ago";
    }

    function esc(s) {
      return String(s ?? "").replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
    }

    function card(l) {
      const reasons = (l.reasons || []).map(esc).join(" · ");
      return `<div class="card" data-id="${esc(l.id)}">
        <div class="row">
          <div style="flex:1">
            <p class="title"><a href="${esc(l.url)}" target="_blank" rel="noopener">${esc(l.title || "(no title)")}</a></p>
            <div class="meta">u/${esc(l.author)} ${l.subreddit ? "· r/" + esc(l.subreddit) : ""} · ${fmtTime(l.created_utc)} · matched “${esc(l.keyword)}”</div>
          </div>
          <span class="status-tag">${esc(l.status)}</span>
        </div>
        <div class="scores">
          <span class="pill sent-${esc(l.sentiment || "low")}">${esc((l.sentiment || "low").toUpperCase())}</span>
          <span class="pill">Intent <b class="num">${l.intent_score}</b></span>
          <span class="pill">Quality <b class="num">${l.quality_score}</b></span>
          <span class="pill">Match <b class="num">${l.match_score}</b></span>
          ${l.ai_used ? '<span class="pill ai">✦ AI</span>' : ""}
        </div>
        ${l.ai_summary ? `<div class="body">${esc(l.ai_summary)}</div>` : (l.body ? `<div class="body">${esc(l.body)}</div>` : "")}
        ${l.ai_angle ? `<div class="angle"><b>Outreach angle:</b> ${esc(l.ai_angle)}</div>` : ""}
        ${reasons ? `<div class="reasons">${reasons}</div>` : ""}
        <div class="actions">
          <button data-act="contacted">Contacted</button>
          <button data-act="won">Won</button>
          <button data-act="dismissed">Dismiss</button>
          <button data-act="new">Reset</button>
        </div>
      </div>`;
    }

    async function load() {
      const p = new URLSearchParams({
        status: $("status").value,
        sort: $("sort").value,
        minIntent: $("minIntent").value,
        search: $("search").value.trim(),
      });
      $("sub").textContent = "Loading…";
      try {
        const res = await fetch("/api/leads?" + p.toString(), { headers: headers() });
        if (res.status === 401) {
          const t = prompt("Enter dashboard access token:");
          if (t) { token = t; localStorage.setItem(TOKEN_KEY, t); return load(); }
          $("sub").textContent = "Access token required.";
          return;
        }
        const data = await res.json();
        const list = $("list");
        if (!data.leads.length) {
          list.innerHTML = '<div class="empty">No leads match. Try lowering the intent filter or switching to “All statuses”.</div>';
        } else {
          list.innerHTML = data.leads.map(card).join("");
        }
        const scan = data.lastScanAt ? "last scan " + fmtTime(data.lastScanAt) : "no scans yet";
        $("sub").textContent = `${data.count} lead${data.count === 1 ? "" : "s"} · ${scan}`;
      } catch (e) {
        $("sub").textContent = "Error: " + e.message;
      }
    }

    async function act(id, status) {
      await fetch("/api/lead", { method: "POST", headers: headers(), body: JSON.stringify({ id, status }) });
      load();
    }

    document.addEventListener("click", (e) => {
      const btn = e.target.closest("button[data-act]");
      if (!btn) return;
      const id = btn.closest(".card").dataset.id;
      act(id, btn.dataset.act);
    });
    ["status", "sort", "minIntent"].forEach((id) => $(id).addEventListener("change", load));
    $("refresh").addEventListener("click", load);
    let t; $("search").addEventListener("input", () => { clearTimeout(t); t = setTimeout(load, 350); });
    load();
  </script>
</body>
</html>
